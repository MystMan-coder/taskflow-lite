version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: taskflow-postgres
    restart: always
    environment:
      POSTGRES_DB: taskflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: ["postgres", "-c", "timezone=Asia/Kolkata"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: